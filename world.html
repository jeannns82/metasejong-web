<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World - METASEJONG</title>

    <!-- Design System -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gray: {
                            800: '#111111',
                            500: '#888888',
                            100: '#f4f4f4',
                            50: '#f9f9f9',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* 2D Character Viewer CSS */
        #two-d-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes characterWave {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(10deg); }
            30% { transform: rotate(-10deg); }
            45% { transform: rotate(8deg); }
            60% { transform: rotate(-8deg); }
            75% { transform: rotate(5deg); }
            90% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        .character-wave {
            animation: characterWave 1.5s ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes floatIdle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .character-idle {
            animation: floatIdle 3s ease-in-out infinite;
        }

        /* Chat scrollbar customization */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>

    <!-- Custom Script (Former 3D removed) -->
</head>

<body class="bg-gradient-to-br from-[#f8fafc] via-[#f1f5f9] to-[#e2e8f0] text-gray-900 min-h-screen flex flex-col">

    <!-- Header / Navigation -->
    <header class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-white/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)]">
        <div class="max-w-[1200px] mx-auto px-5 h-[60px] flex items-center justify-between">
            <a href="index.html" class="font-bold text-xl shrink-0"><img src="images/logo.png" alt="METASEJONG"
                    class="h-8 w-auto block"></a>
            <nav class="hidden md:block">
                <ul class="flex gap-6">
                    <li><a href="index.html"
                            class="text-sm text-gray-500 hover:text-gray-800 hover:font-semibold transition-colors">Introduce</a>
                    </li>
                    <li><a href="works.html"
                            class="text-sm text-gray-500 hover:text-gray-800 hover:font-semibold transition-colors">Works</a>
                    </li>

                    <li><a href="publication.html"
                            class="text-sm text-gray-500 hover:text-gray-800 hover:font-semibold transition-colors">Publication</a>
                    </li>
                    <li><a href="contact.html"
                            class="text-sm text-gray-500 hover:text-gray-800 hover:font-semibold transition-colors">Contact</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- World Section - Chat & 3D Interatcion -->
    <section class="flex-1 pt-[80px] pb-10 flex items-center justify-center relative overflow-x-hidden md:overflow-hidden">
        
        <!-- Decorative Background Elements -->
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-gradient-to-br from-[#c4b5fd]/40 to-[#93c5fd]/40 blur-[80px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-gradient-to-br from-[#fbcfe8]/40 to-[#bae6fd]/40 blur-[100px] pointer-events-none"></div>

        <div class="max-w-[1400px] w-full mx-auto px-5 h-auto md:h-[calc(100vh-140px)] min-h-0 md:min-h-[600px] flex flex-col md:flex-row gap-6 relative z-10">
            
            <!-- Character Selector & 3D Viewer Area (Left Side) -->
            <div class="w-full md:w-1/2 lg:w-3/5 h-[400px] md:h-full flex flex-col bg-white/40 backdrop-blur-xl border border-white/60 rounded-[32px] p-6 shadow-[0_8px_32px_rgba(0,0,0,0.04)] relative">
                
                <!-- Character Tabs -->
                <div class="flex items-center gap-2 mb-4 bg-white/50 p-1.5 rounded-full self-start shadow-sm border border-white/80">
                    <button id="tab-king" class="px-6 py-2 rounded-full text-sm font-bold bg-white text-gray-900 shadow-sm transition-all focus:outline-none">King Sejong</button>
                    <!-- <button id="tab-hip" class="px-6 py-2 rounded-full text-sm font-medium text-gray-500 hover:text-gray-800 transition-all">Hip Sejong</button> -->
                </div>

                <!-- 2D Character Viewer -->
                <div class="flex-1 w-full bg-gradient-to-b from-transparent to-black/5 rounded-[20px] overflow-hidden relative" id="two-d-container">
                    <img id="2d-character" src="images/character.png" alt="King Sejong" class="character-idle max-h-full max-w-full object-contain drop-shadow-xl transition-transform duration-300 hover:scale-105 cursor-pointer origin-bottom" style="max-height: 90%; padding-top: 10%;">
                </div>
            </div>

            <!-- Chat Interface Area (Right Side) -->
            <div class="w-full md:w-1/2 lg:w-2/5 h-[500px] md:h-full flex flex-col bg-white/70 backdrop-blur-2xl border border-white/80 rounded-[32px] p-6 shadow-[0_8px_32px_rgba(0,0,0,0.06)]">
                
                <!-- Chat Header -->
                <div class="flex items-center gap-4 border-b border-gray-100 pb-4 mb-4">
                    <div class="w-12 h-12 rounded-full overflow-hidden border border-gray-100 shadow-sm bg-white flex-shrink-0">
                        <img id="chat-icon" src="images/icon01.png" alt="Sejong Profile" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h2 id="chat-title" class="font-bold text-lg text-gray-900 tracking-tight">세종대왕 (King Sejong)</h2>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                            <span class="text-[12px] text-gray-500 font-medium">온라인</span>
                        </div>
                    </div>
                </div>

                <!-- Chat History Scroll Area -->
                <div class="flex-1 overflow-y-auto chat-scroll pr-2 flex flex-col gap-5 pb-4" id="chat-history">
                    <!-- 초기 메시지 -->
                    <div class="flex gap-3 message-anim items-end">
                        <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 border border-gray-100 shadow-sm bg-white">
                            <img src="images/icon01.png" alt="Profile" class="w-full h-full object-cover" id="chat-icon-ai-profile">
                        </div>
                        <div class="bg-gray-50 border border-gray-100/80 px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm max-w-[85%] relative">
                            <p class="text-[14px] text-gray-700 leading-relaxed font-light">반가워요! 저는 백성을 몹시 아끼는 조선의 임금, 세종(도)입니다. 이곳에 어떤 일로 찾아오셨나요? 편하게 질문해주세요! 😊</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Input Box -->
                <div class="mt-auto pt-4 relative">
                    <form id="chat-form" class="relative flex items-center">
                        <input type="text" id="chat-input" placeholder="여기에 질문을 입력해보세요..." 
                            class="w-full bg-white/80 border border-gray-200/80 text-sm text-gray-800 rounded-full pl-5 pr-12 py-3.5 outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100/50 transition-all shadow-sm" required>
                        <button type="submit" class="absolute right-2 w-9 h-9 flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-full transition-colors shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-send-fill transform translate-x-[-1px] translate-y-[1px]" viewBox="0 0 16 16">
                                <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
                            </svg>
                        </button>
                    </form>
                </div>

            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="py-6 text-center border-t border-gray-100 text-gray-500 text-sm bg-white/50 backdrop-blur-md">
        <div class="max-w-[1200px] mx-auto px-5">
            <p>&copy; 2026 METASEJONG. All rights reserved.</p>
        </div>
    </footer>

    <!-- 3D & Chat Script -->
    <script src="js/chat.js?v=3" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnKing = document.getElementById('tab-king');
            // const btnHip = document.getElementById('tab-hip');
            
            const chatTitle = document.getElementById('chat-title');
            const chatIcon = document.getElementById('chat-icon');
            const chatIconProfile = document.getElementById('chat-icon-ai-profile');
            const characterImg = document.getElementById('2d-character');

            // Handle character reaction event from chat.js
            window.addEventListener('characterReact', () => {
                if (characterImg) {
                    characterImg.classList.remove('character-wave');
                    // Trigger reflow to restart animation
                    void characterImg.offsetWidth;
                    characterImg.classList.add('character-wave');
                }
            });

            // Set active styles for tab
            const setActiveTab = (activeBtn, inactiveBtn) => {
                activeBtn.classList.remove('text-gray-500', 'font-medium', 'hover:text-gray-800');
                activeBtn.classList.add('bg-white', 'text-gray-900', 'font-bold', 'shadow-sm');
                
                if (inactiveBtn) {
                    inactiveBtn.classList.remove('bg-white', 'text-gray-900', 'font-bold', 'shadow-sm');
                    inactiveBtn.classList.add('text-gray-500', 'font-medium', 'hover:text-gray-800');
                    inactiveBtn.style.backgroundColor = 'transparent';
                }
            };

            // Switch to King Sejong
            btnKing.addEventListener('click', () => {
                // setActiveTab(btnKing, btnHip);
                chatTitle.textContent = "세종대왕 (King Sejong)";
                chatIcon.src = "images/icon01.png";
                if(chatIconProfile) chatIconProfile.src = "images/icon01.png";
                // Trigger context change in chat.js if needed (e.g., reset conversation)
                window.dispatchEvent(new CustomEvent('changeWorldModel', { detail: 'king' }));
            });

            // Switch to Hip Sejong (Removed)
            /*
            btnHip.addEventListener('click', () => {
                setActiveTab(btnHip, btnKing);
                chatTitle.textContent = "힙세종 (Hip Sejong)";
                chatIcon.src = "images/icon01.png"; 
                if(chatIconProfile) chatIconProfile.src = "images/icon01.png";
                window.dispatchEvent(new CustomEvent('changeWorldModel', { detail: 'hip' }));
            });
            */
        });
    </script>
</body>

</html>
